name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shellcheck + bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: bash -n syntax check
        run: |
          bash -n gmr
          bash -n install.sh
          for f in scripts/*.sh; do bash -n "$f"; done

      - name: shellcheck (install.sh + scripts)
        run: |
          shellcheck -x install.sh scripts/*.sh

      - name: shellcheck (gmr, informational)
        continue-on-error: true
        run: |
          shellcheck -x gmr

  test:
    name: bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats
        run: bats -r tests
